name: Keep backend warm

# 每 5 分鐘 ping 一次 /api/health，讓 Vercel serverless 至少維持一個溫熱實例，
# 並保活 Mongo 連線，降低使用者請求被冷啟動（約 7s）打到的機率。
# 注意：GitHub 排程可能延遲數分鐘、且 repo 連續 60 天無活動會自動停用排程。
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping warmup endpoint
        run: |
          curl -fsS --max-time 30 https://touching-backend.vercel.app/api/health \
            && echo "warmup ok" \
            || echo "warmup failed (non-blocking)"
